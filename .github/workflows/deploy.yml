name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - master

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      DOCKER_BUILDKIT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/known_hosts <<'EOF'
          37.120.188.157 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILDORNXS0WqMQL+BkZ6KRZON1Fpd13fOeGxzUPmVElCS
          37.120.188.157 ssh-rsa 
          37.120.188.157 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBNGIBpfq7H61NrmwOmS4npWFZIsJuURB4Xh47BL3p2IMnlLW2jTpXsCh6lgOgkkiX584eQp4nubMMNDCbtfcP0I=
          EOF

      - name: Create Kamal secrets file
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NEWRELIC_LICENSE_KEY: ${{ secrets.NEWRELIC_LICENSE_KEY }}
          ROLLBAR_ACCESS_TOKEN: ${{ secrets.ROLLBAR_ACCESS_TOKEN }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
        run: |
          mkdir -p .kamal
          cat > .kamal/secrets <<EOF
          RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
          DATABASE_PASSWORD=${DATABASE_PASSWORD}
          POSTGRES_PASSWORD=${DATABASE_PASSWORD}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          SMTP_ADDRESS=${SMTP_ADDRESS}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USERNAME=${SMTP_USERNAME}
          SMTP_PASSWORD=${SMTP_PASSWORD}
          NEWRELIC_LICENSE_KEY=${NEWRELIC_LICENSE_KEY}
          ROLLBAR_ACCESS_TOKEN=${ROLLBAR_ACCESS_TOKEN}
          UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
          EOF

      - name: Deploy with Kamal
        run: bin/kamal deploy
